<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Remote</title>
    <style>
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 10px;
            border-bottom: 1px solid #444;
            margin-bottom: 15px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #f44336;
            transition: 0.3s;
            border-radius: 26px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #4CAF50;
        }

        input:checked+.slider:before {
            transform: translateX(24px);
        }

        body {
            font-family: sans-serif;
            background: #1e1e1e;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        .panel {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        button {
            font-size: 22px;
            padding: 15px 25px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            width: 40%;
        }

        input {
            font-size: 22px;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
            text-align: center;
            width: 60%;
        }

        #add {
            background: #4CAF50;
        }

        #sub {
            background: #f44336;
        }

        #pause {
            background: #ff9800;
            width: 90%;
            padding: 20px;
        }

        #update-label-btn,
        #set-number-btn {
            background: #2196F3;
            width: 60%;
            font-size: 18px;
        }

        #login-btn {
            background: #2196F3;
            width: 65%;
        }

        h1 {
            font-size: 50px;
            margin: 10px 0;
        }

        h2 {
            margin-top: 0;
            color: #aaa;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>

<body>
    <div id="login-panel" class="panel" style="display: block;">
        <h2>Stream Remote Login</h2>
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-password" placeholder="Password">
        <br>
        <button id="login-btn">Secure Login</button>
        <p id="login-error" style="color: #ff5252; display: none; font-weight: bold;">Access Denied.</p>
    </div>

    <div id="control-panel" style="display: none;">

        <div class="panel">
            <h2>Stream Controls</h2>
            <button id="pause">⏸ Pause Stream</button>
        </div>

        <div class="panel">
            <div class="panel-header">
                <label class="switch">
                    <input type="checkbox" id="visibility-toggle" checked>
                    <span class="slider"></span>
                </label>

                <h2 style="margin: 0;">Counter Controls</h2>

                <span id="chevron-btn"
                    style="cursor: pointer; transition: transform 0.3s; display: flex; align-items: center;">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </span>
            </div>

            <div id="counter-content" style="display: block;">
                <h1 id="counter-display">0</h1>
                <button id="sub">-1</button>
                <button id="add">+1</button>

                <input type="text" id="custom-label-input" placeholder="e.g., Deaths, Wins">
                <button id="update-label-btn">Set Label</button>

                <input type="number" id="exact-number-input" placeholder="Type specific #">
                <button id="set-number-btn">Set #</button>

                <div style="margin-top: 15px;">
                    <label for="color-picker"
                        style="font-size: 20px; font-weight: bold; margin-right: 10px; vertical-align: middle;">Text
                        Color:</label>
                    <input type="color" id="color-picker" value="#ffffff"
                        style="width: 50px; height: 50px; padding: 0; cursor: pointer; border: none; vertical-align: middle;">
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
